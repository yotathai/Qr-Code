<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>th-go.link - World-Class URL Shortener & QR Code</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">
            <span class="logo-text">th-go.link</span>
        </div>
        
        <div class="nav-right" style="display: flex; align-items: center; gap: 20px;">
            <!-- Theme Color Picker -->
            <div class="theme-picker" style="display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 0.8rem; color: var(--text-muted);">สีธีมเว็บ:</span>
                <input type="color" id="themeColor" value="#f97316" title="เปลี่ยนสีเว็บไซต์" style="width: 25px; height: 25px; padding: 0; border: none; border-radius: 5px; cursor: pointer;">
            </div>

            <div class="nav-auth">
                <!-- Loading State -->
                <div id="authLoader" class="nav-loader">กำลังตรวจสอบ...</div>
                
                <!-- Not Logged In -->
                <div id="loginSection" class="hidden">
                    <button id="loginBtn" class="btn-login">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                        เข้าสู่ระบบด้วย Google
                    </button>
                </div>
                
                <!-- Logged In -->
                <div id="userProfile" class="user-profile hidden">
                    <img id="userAvatar" src="" alt="Avatar" class="avatar">
                    <div class="user-info">
                        <span id="userName" class="user-name"></span>
                        <button id="logoutBtn" class="btn-logout">ออกจากระบบ</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-container">
        <!-- The Warning (Now elegant overlay on input if not logged in) -->
        <div id="authRequiredBanner" class="glass-banner hidden">
            <div class="banner-icon">🔒</div>
            <div class="banner-text">กรุณาเข้าสู่ระบบด้านบนก่อนใช้งาน เพื่อความปลอดภัยระดับสูงสุด (Production Security)</div>
        </div>

        <!-- Dashboard Card -->
        <div class="dashboard-card">
            <!-- Segmented Control for Modes -->
            <div class="mode-selector">
                <button class="mode-btn active" data-mode="both">ทั้งหมด (ลิงก์ + QR)</button>
                <button class="mode-btn" data-mode="shortlink">ลิงก์อย่างเดียว</button>
                <button class="mode-btn" data-mode="qrcode">QR อย่างเดียว</button>
            </div>

            <!-- Input Section -->
            <div class="input-group">
                <input type="url" id="longUrl" placeholder="วางลิงก์ยาวๆ ที่นี่... (เช่น https://www.google.com)" disabled>
            </div>

            <!-- Custom Alias -->
            <div class="input-group" id="aliasGroup">
                <div class="alias-wrapper">
                    <span class="alias-prefix">th-go.link/</span>
                    <input type="text" id="customAlias" placeholder="กำหนดชื่อลิงก์เอง (ถ้ามี)" disabled>
                </div>
            </div>

            <!-- QR Options (Hidden in Shortlink mode) -->
            <div class="qr-options-panel" id="qrOptionsPanel">
                <h3 class="panel-title">ตกแต่ง QR Code</h3>
                <div class="qr-grid">
                    <div class="qr-control">
                        <label>สี QR Code</label>
                        <div class="color-picker-wrapper">
                            <input type="color" id="qrColor" value="#000000" disabled>
                        </div>
                    </div>
                    <div class="qr-control">
                        <label>สีพื้นหลัง</label>
                        <div class="color-picker-wrapper">
                            <input type="color" id="qrBgColor" value="#ffffff" disabled>
                        </div>
                    </div>
                    <div class="qr-control file-upload-wrapper">
                        <label>โลโก้ตรงกลาง (ถ้ามี)</label>
                        <input type="file" id="qrLogo" accept="image/*" disabled class="file-input">
                    </div>
                </div>
            </div>

            <!-- Action Button -->
            <button id="generateBtn" class="btn-generate" disabled>สร้างลิงก์และ QR Code</button>
        </div>

        <!-- Output Section -->
        <div id="resultContainer" class="result-card hidden">
            <h2 class="result-title">ผลลัพธ์ของคุณพร้อมแล้ว! 🎉</h2>
            <div class="result-grid">
                <!-- Shortlink Result -->
                <div id="shortlinkResult" class="result-item">
                    <h3>ลิงก์ย่อของคุณ</h3>
                    <div class="copy-box">
                        <a href="#" id="finalShortlink" target="_blank" class="shortlink-text"></a>
                        <button id="copyBtn" class="btn-copy">คัดลอก</button>
                    </div>
                </div>
                <!-- QR Result -->
                <div id="qrResult" class="result-item">
                    <h3>QR Code</h3>
                    <div class="qr-canvas-wrapper">
                        <canvas id="qrCanvas"></canvas>
                    </div>
                    <button id="downloadQrBtn" class="btn-download">ดาวน์โหลด QR Code</button>
                </div>
            </div>
        </div>

        <!-- History Section -->
        <section class="history-section hidden" id="historySection">
            <h2 class="section-title">ประวัติการสร้างลิงก์</h2>
            <div class="table-responsive">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>ชื่อลิงก์</th>
                            <th>ลิงก์ยาว</th>
                            <th>โหมด</th>
                            <th>คลิก</th>
                            <th>วันที่สร้าง</th>
                        </tr>
                    </thead>
                    <tbody id="historyList">
                        <!-- History rows will go here -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
