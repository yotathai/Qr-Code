<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กำลังพาท่านไปยังปลายทาง...</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f3f4f6;
            color: #1f2937;
            text-align: center;
        }
        .loader {
            border: 4px solid #e5e7eb;
            border-top: 4px solid #f97316;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { margin-bottom: 10px; font-weight: 500; }
        p { color: #6b7280; font-size: 0.9em; }
    </style>
</head>
<body>
    <div>
        <div class="loader"></div>
        <h2 id="statusMessage">กำลังตรวจสอบลิงก์...</h2>
        <div id="fallbackText" style="margin-top: 15px;">
            <p>รอสักครู่ ระบบกำลังนำท่านไปยังปลายทาง</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Same config as Webboard
        const firebaseConfig = {
            apiKey: "AIzaSyBRcQzCZint9dAkzO73cy9EYgUS1pcjcvM",
            authDomain: "th-go-link.firebaseapp.com",
            projectId: "th-go-link",
            storageBucket: "th-go-link.firebasestorage.app",
            messagingSenderId: "816629073092",
            appId: "1:816629073092:web:6111f00bd629a2a0d9f591",
            measurementId: "G-3TXWT1LVLF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function redirect() {
            const statusMessage = document.getElementById('statusMessage');
            
            // Get path, e.g. from th-go.link/xyz -> path is /xyz -> shortCode is xyz
            // GitHub pages might include the repo name if accessed via yotathai.github.io/th-go/xyz
            let path = window.location.pathname.replace(/^\/+|\/+$/g, '');
            
            if (path.startsWith('th-go/')) {
                path = path.replace('th-go/', '');
            }

            if (!path || path === 'index.html' || path === '404.html') {
                window.location.replace('/');
                return;
            }

            try {
                const q = query(collection(db, "shortlinks"), where("alias", "==", path));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const docData = querySnapshot.docs[0];
                    const data = docData.data();
                    
                    // Increment click count (Total and Daily)
                    try {
                        const today = new Date();
                        // Format: YYYY-MM-DD using local time
                        const yyyy = today.getFullYear();
                        const mm = String(today.getMonth() + 1).padStart(2, '0');
                        const dd = String(today.getDate()).padStart(2, '0');
                        const todayStr = `${yyyy}-${mm}-${dd}`;
                        
                        await updateDoc(doc(db, "shortlinks", docData.id), {
                            clicks: increment(1),
                            [`clicks_${todayStr}`]: increment(1)
                        });
                    } catch (e) {
                        console.error("Failed to update click count", e);
                    }

                    statusMessage.textContent = "กำลังพาท่านไป...";
                    
                    const isFacebookApp = function() {
                        var ua = navigator.userAgent || navigator.vendor || window.opera;
                        return (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1) || (ua.indexOf("Line") > -1);
                    }();

                    let fallbackHTML = `
                        <p style="margin-bottom: 15px; color: #4b5563;">หากระบบไม่เปลี่ยนหน้าอัตโนมัติ กรุณากดปุ่มด้านล่าง</p>
                        <a href="${data.originalUrl}" style="display: inline-block; background-color: #f97316; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 500; box-shadow: 0 4px 6px -1px rgba(249, 115, 22, 0.2);">👉 เปิดหน้าเว็บ / ดาวน์โหลดไฟล์</a>
                    `;

                    if (isFacebookApp) {
                        fallbackHTML += `<p style="margin-top: 20px; font-size: 0.85em; color: #ef4444; max-width: 300px; margin-left: auto; margin-right: auto;">
                            ⚠️ หมายเหตุ: แอป Facebook/LINE อาจบล็อกการดาวน์โหลดไฟล์ แนะนำให้กดที่ <strong>จุด 3 จุด (...)</strong> แล้วเลือก <strong>'เปิดในเบราว์เซอร์' (Open in Browser)</strong>
                        </p>`;
                    }

                    document.getElementById('fallbackText').innerHTML = fallbackHTML;
                    
                    // Hide loader after a short delay since it's ready
                    setTimeout(() => {
                        const loader = document.querySelector('.loader');
                        if(loader) loader.style.display = 'none';
                    }, 500);
                    
                    // Use href instead of replace for better compatibility with FB/Line in-app browsers
                    window.location.href = data.originalUrl;
                } else {
                    statusMessage.textContent = "ไม่พบลิงก์นี้ในระบบ";
                    setTimeout(() => {
                        window.location.replace('/');
                    }, 2000);
                }
            } catch (error) {
                console.error("Error fetching shortlink:", error);
                statusMessage.textContent = "เกิดข้อผิดพลาดในการเชื่อมต่อ";
                setTimeout(() => {
                    window.location.replace('/');
                }, 2000);
            }
        }

        redirect();
    </script>
</body>
</html>
