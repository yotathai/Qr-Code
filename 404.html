<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กำลังพาท่านไปยังปลายทาง...</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f3f4f6;
            color: #1f2937;
            text-align: center;
        }
        .loader {
            border: 4px solid #e5e7eb;
            border-top: 4px solid #f97316;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { margin-bottom: 10px; font-weight: 500; }
        p { color: #6b7280; font-size: 0.9em; }
    </style>
</head>
<body>
    <div>
        <div class="loader"></div>
        <h2 id="statusMessage">กำลังตรวจสอบลิงก์...</h2>
        <p>รอสักครู่ ระบบกำลังนำท่านไปยังปลายทาง</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Same config as Webboard
        const firebaseConfig = {
            apiKey: "AIzaSyBRcQzCZint9dAkzO73cy9EYgUS1pcjcvM",
            authDomain: "th-go-link.firebaseapp.com",
            projectId: "th-go-link",
            storageBucket: "th-go-link.firebasestorage.app",
            messagingSenderId: "816629073092",
            appId: "1:816629073092:web:6111f00bd629a2a0d9f591",
            measurementId: "G-3TXWT1LVLF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function redirect() {
            const statusMessage = document.getElementById('statusMessage');
            
            // Get path, e.g. from th-go.link/xyz -> path is /xyz -> shortCode is xyz
            // GitHub pages might include the repo name if accessed via yotathai.github.io/th-go/xyz
            let path = window.location.pathname.replace(/^\/+|\/+$/g, '');
            
            if (path.startsWith('th-go/')) {
                path = path.replace('th-go/', '');
            }

            if (!path || path === 'index.html' || path === '404.html') {
                window.location.replace('/');
                return;
            }

            try {
                const q = query(collection(db, "shortlinks"), where("short_code", "==", path));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const docData = querySnapshot.docs[0];
                    const data = docData.data();
                    
                    // Optional: Increment click count
                    try {
                        await updateDoc(doc(db, "shortlinks", docData.id), {
                            clicks: increment(1)
                        });
                    } catch (e) {
                        console.error("Failed to update click count", e);
                    }

                    statusMessage.textContent = "กำลังพาท่านไป...";
                    window.location.replace(data.original_url);
                } else {
                    statusMessage.textContent = "ไม่พบลิงก์นี้ในระบบ";
                    setTimeout(() => {
                        window.location.replace('/');
                    }, 2000);
                }
            } catch (error) {
                console.error("Error fetching shortlink:", error);
                statusMessage.textContent = "เกิดข้อผิดพลาดในการเชื่อมต่อ";
                setTimeout(() => {
                    window.location.replace('/');
                }, 2000);
            }
        }

        redirect();
    </script>
</body>
</html>
